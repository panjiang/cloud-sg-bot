name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          binary="cloud-sg-bot"
          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist build

          platforms=(
            "linux/amd64"
            "linux/arm64"
          )

          for platform in "${platforms[@]}"; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            asset="${binary}_${goos}_${goarch}.tar.gz"

            rm -rf build
            mkdir -p build

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}" \
                -o "build/${binary}" .

            tar -C build -czf "dist/${asset}" "${binary}"
          done

          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(
            git tag --sort=-v:refname --merged "${current_tag}^{}" \
              | grep -v "^${current_tag}$" \
              | head -n 1 \
              || true
          )"

          if [ -n "${previous_tag}" ]; then
            git log --format='- %s' "${previous_tag}..${current_tag}" | head -10 > release_notes.md
            if [ -s release_notes.md ]; then
              printf '\n' >> release_notes.md
            fi
            printf 'Full Changelog: %s...%s\n' "${previous_tag}" "${current_tag}" >> release_notes.md
          else
            git log --format='- %s' "${current_tag}" | head -10 > release_notes.md
          fi

      - name: Create Or Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
            gh release edit "${tag}" --notes-file release_notes.md
          else
            gh release create "${tag}" dist/* --verify-tag --notes-file release_notes.md
          fi
